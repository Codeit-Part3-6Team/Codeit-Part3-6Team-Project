experiment:
  name: rag_langchain
  author: team
  seed: 42
  contract_version: rag-v0.2

paths:
  raw_docs_dir: /shared/data/raw_docs   # VM 공유 데이터 경로. 로컬 실행 시 data/rag_sample 로 변경
  output_dir: experiments/rag_langchain

artifact_policy:
  run_id:
  on_existing: overwrite

rag:
  engine: langchain
  loader:
    file_types: [txt, pdf, docx, hwpx, hwp]
  splitter:
    type: recursive_character
    chunk_size: 500
    chunk_overlap: 80
  checkpoint:
    enabled: true
    resume: true
  embedding:
    provider: local
    model_name: hashing-char-ngram-v1
    dimension: 64
  vector_store:
    type: memory
    path:
    collection_name: rag_langchain
  retriever:
    method: similarity
    top_k: 3
    score_threshold: 0.0
  reranker:
    enabled: false
    provider: huggingface
    model_name: BAAI/bge-reranker-v2-m3
    top_k: 3
  answerer:
    mode: extractive
    provider: local
    model_name:
    fallback_message: 문서에서 확인하지 못했습니다.
    memory:
      enabled: false
    temperature: 0.2

evaluation:
  questions_path: data/rag_sample/eval_questions.csv

metric:
  monitor: retrieval_hit_rate
  mode: max
