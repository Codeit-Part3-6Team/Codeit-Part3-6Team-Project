# Agent 데모 config — L+ 적합도 판단 시나리오
# rag-baseline.yaml을 base_config로 상속받아 RAG 설정은 그대로 사용하고
# agent 확장만 덧붙입니다.
#
# 실행:
#   python scripts/run_rag_agent.py --config configs/experiments/rag/agent/agent_lplus.yaml --verbose
#   python scripts/run_rag_agent.py --config agent/agent_lplus.yaml --question "이 사업에 참여해도 될까?"
#
# base_config가 없으면 rag config 안에 agent를 직접 넣어도 동작합니다.
# 두 방식 모두 지원되며, EL이 선호하는 방식으로 선택하면 됩니다.

experiment:
  name: agent-lplus
  author: team
  contract_version: rag-v0.2

# RAG 설정을 rag-baseline.yaml에서 상속
base_config: ../rag-baseline.yaml

paths:
  output_dir: /shared/experiments/agent-lplus

# ── Agent 확장 ──
agent:
  enabled: true
  max_steps: 10
  verbose: true

  schemas:
    facts_schema:
      fields:
        사업명: str
        발주기관: str
        사업예산: str
        사업기간: str
        제출마감: str
        자격요건: list[str]

    decision_schema:
      fields:
        참여여부: bool
        근거: str
        리스크: list[str]
        제안_주의사항: str | None

    requirements_schema:
      fields:
        참가자격: list[str]
        제출서류: list[str]
        평가기준: str

    comparison_schema:
      fields:
        문서목록: list[str]
        비교결과: str

  phases:
    - name: extract
      # Agent Loop 모드 (Tool 반복 실행)
  loop:
    enabled: false
    max_iterations: 5

  tools: [extract_facts]

    - name: decide
      # Agent Loop 모드 (Tool 반복 실행)
  loop:
    enabled: false
    max_iterations: 5

  tools: [decide_participation]
      depends_on: [extract]

  # 챗봇 모드 (Phase DAG 대신 대화형 Tool 선택)
  # chatbot.enabled: true → agent.chatbot.enabled: true, agent.enabled: true
  # 챗봇 모드는 Phase DAG를 무시하고 LLM이 동적으로 Tool을 선택합니다.
  chatbot:
    enabled: false
    tool_selection_model: gpt-4o-mini
    max_history: 10
    system_prompt: |
      너는 RFP 문서 분석 도우미 챗봇이다.
      사용자의 질문에 가장 적합한 도구를 선택하여 분석 결과를 제공하라.

  # Agent Loop 모드 (Tool 반복 실행)
  loop:
    enabled: false
    max_iterations: 5

  tools:
    extract_requirements:
      description: "RFP 문서에서 참가자격, 제출서류, 평가기준 등 입찰 요구사항을 추출합니다."
      retriever:
        top_k: 10
      answerer:
        output_schema: requirements_schema
        prompt_template: |
          너는 RFP 문서에서 입찰 참가 요구사항을 추출하는 분석기다.
          아래 근거에 있는 내용만 사용해서 각 필드에 해당하는 정보를 찾아 채워라.
          문서에 명시된 내용만 답하고, 없는 정보는 '명시되지 않음'으로 표시하라.

          {context}

          질문: {question}
        temperature: 0.1
      on_failure: skip

    search_rfp_documents:
      description: "전체 RFP 문서 중 조건에 맞는 문서를 검색합니다. 예산 범위, 키워드, 자격요건 등으로 필터링합니다."
      retriever:
        top_k: 20
      answerer:
        prompt_template: |
          너는 RFP 문서 검색 엔진이다.
          아래 검색된 근거를 바탕으로, 사용자 질문의 조건에 맞는 문서 목록을 반환하라.
          각 문서의 document_id와 사업명, 예산, 간략한 설명을 포함하라.

          근거:
          {context}

          질문: {question}
        temperature: 0.1
      on_failure: skip

    compare_rfps:
      description: "여러 RFP 문서를 예산, 기간, 자격요건, 마감일, 발주기관 등 기준으로 비교 분석하여 표로 정리합니다."
      retriever:
        top_k: 30
      answerer:
        output_schema: comparison_schema
        prompt_template: |
          너는 RFP 문서 비교 분석기다.
          아래 근거를 바탕으로 여러 RFP 문서를 비교하여 표 형식으로 정리하라.
          각 문서의 예산, 기간, 자격요건, 마감일, 발주기관을 비교하라.

          근거:
          {context}

          질문: {question}
        temperature: 0.1
      on_failure: skip

    extract_facts:
      description: "RFP 문서에서 사업명, 발주기관, 예산, 기간, 마감일, 자격요건 등 핵심 사실 정보를 추출합니다."
      retriever:
        top_k: 10
      answerer:
        output_schema: facts_schema
        prompt_template: |
          너는 RFP 문서에서 사실 정보만 추출하는 분석기다.
          아래 근거에 있는 내용만 사용해서, 각 필드에 해당하는 정보를 찾아 채워라.
          문서에 명시된 내용만 답하고, 없는 정보는 '명시되지 않음'으로 표시하라.

          {context}

          질문: {question}
        temperature: 0.1
      on_failure: abort_phase

    decide_participation:
      description: "추출된 RFP 정보를 바탕으로 참여 가능 여부를 판단하고 리스크를 식별합니다."
      input_from: [extract_facts]
      retriever:
        top_k: 5
      answerer:
        model_name: gpt-4o-mini
        output_schema: decision_schema
        prompt_template: |
          너는 RFP 입찰 참여 여부를 판단하는 컨설턴트다.
          아래 추출된 RFP 정보를 바탕으로, 중소 IT 서비스 기업 기준으로 참여 가능 여부를 판단하라.

          추출된 RFP 정보:
          {context}

          우리 회사 프로필:
          - 규모: 중소기업, 직원 50인
          - 주요 분야: 전자정부 시스템 개발, 클라우드 마이그레이션
          - 연간 매출: 약 60억
          - 보유 자격: 소프트웨어사업자(컨설팅/개발), 정보보호 관리체계(ISMS) 인증
          - 참고: 2억 이상 사업은 컨소시엄 구성 필요, 10억 초과 시 대기업 경쟁 가능성 높음

          판단 질문: {question}
        temperature: 0.2
      on_failure: abort_phase
