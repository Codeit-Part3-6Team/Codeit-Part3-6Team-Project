# Agent Loop 데모 config
# base_config로 rag-baseline.yaml 상속, agent.loop.enabled: true
#
# 실행:
#   python scripts/run_rag_agent.py --config configs/experiments/rag/agent/agent_loop.yaml
#   python scripts/run_rag_agent.py --config agent/agent_loop.yaml --question "이 사업 예산은?"

experiment:
  name: agent-loop
  author: team
  contract_version: rag-v0.2

base_config: ../rag-baseline.yaml

paths:
  output_dir: /shared/experiments/agent-loop

agent:
  enabled: true

  loop:
    enabled: true           # Plan -> Execute -> Evaluate 반복
    max_iterations: 5       # 최대 Tool 실행 횟수

  phases:
    - name: extract
      tools: [extract_facts]

    - name: decide
      tools: [decide_participation]
      depends_on: [extract]

  chatbot:
    enabled: false

  schemas:
    facts_schema:
      fields:
        사업명: str
        발주기관: str
        사업예산: str
        사업기간: str
        제출마감: str
        자격요건: list[str]

    decision_schema:
      fields:
        참여여부: bool
        근거: str
        리스크: list[str]

  tools:
    extract_facts:
      description: "RFP 문서에서 사업명, 발주기관, 예산, 기간, 마감일, 자격요건 등 핵심 사실 정보를 추출합니다."
      retriever:
        top_k: 10
      answerer:
        output_schema: facts_schema
        prompt_template: |
          너는 RFP 문서에서 사실 정보만 추출하는 분석기다.
          아래 근거에 있는 내용만 사용해서 각 필드에 해당하는 정보를 찾아 채워라.
          문서에 명시된 내용만 답하고, 없는 정보는 '명시되지 않음'으로 표시하라.

          {context}

          질문: {question}
        temperature: 0.1
      on_failure: abort_phase

    decide_participation:
      description: "추출된 RFP 정보를 바탕으로 참여 가능 여부를 판단하고 리스크를 식별합니다."
      input_from: [extract_facts]
      retriever:
        top_k: 5
      answerer:
        output_schema: decision_schema
        prompt_template: |
          너는 RFP 입찰 참여 여부를 판단하는 컨설턴트다.
          아래 추출된 RFP 정보를 바탕으로 중소 IT 서비스 기업 기준으로 참여 가능 여부를 판단하라.

          추출된 RFP 정보:
          {context}

          판단 질문: {question}
        temperature: 0.2
      on_failure: abort_phase
