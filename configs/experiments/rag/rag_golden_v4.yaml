experiment:
  name: rag_golden_v4
  author: team
  seed: 42
  contract_version: rag-v0.2

paths:
  raw_docs_dir: data/raw/v4_csv_only   # data_list_버전4.csv만 들어있는 전용 폴더 (v2/v3/eval csv 혼입 방지)
  output_dir: experiments/rag_golden_v4

artifact_policy:
  run_id:
  on_existing: overwrite

rag:
  engine: langchain
  loader:
    file_types: [csv]
  splitter:
    type: recursive_character
    chunk_size: 500
    chunk_overlap: 80
  checkpoint:
    enabled: true
    resume: true
  embedding:
    provider: local
    model_name: hashing-char-ngram-v1
    dimension: 64
  vector_store:
    type: memory
    path:
    collection_name: rag_golden_v4
  retriever:
    method: similarity
    top_k: 3
    score_threshold: 0.0
  reranker:
    enabled: false
    provider: huggingface
    model_name:
    top_k: 3
  answerer:
    mode: extractive
    provider: local
    model_name:
    fallback_message: 문서에서 확인하지 못했습니다.

evaluation:
  questions_path: data/raw/eval_questions_v6_mini50.csv

metric:
  monitor: retrieval_hit_rate
  mode: max
