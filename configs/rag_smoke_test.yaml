experiment:
  name: rag_smoke_test
  author: team
  seed: 42
  contract_version: rag-v0.1

paths:
  raw_docs_dir: data/rag_smoke
  output_dir: experiments/rag_smoke_test

rag:
  loader:
    file_types: [txt, pdf, docx, hwpx, hwp]
  chunk:
    size: 500
    overlap: 80
    unit: char
  embedding:
    provider: local
    model_name: hashing-char-ngram-v1
    dimension: 64
  retriever:
    method: semantic
    top_k: 3
    score_threshold: 0.0
  answerer:
    mode: extractive
    fallback_message: 문서에서 확인하지 못했습니다.

evaluation:
  questions_path: data/rag_smoke/eval_questions.csv

metric:
  monitor: retrieval_hit_rate
  mode: max
