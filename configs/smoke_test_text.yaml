experiment:
  name: smoke_test_text
  author: team
  seed: 42
  contract_version: v1.0

paths:
  data_dir: data/text_processed
  output_dir: experiments/smoke_test_text
  backup_dir:

artifact_policy:
  run_id:
  on_existing: overwrite

data:
  task: text_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  text_col: text
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json

model:
  name: keyword_text_classifier
  num_classes: auto

train:
  epochs: 1

metric:
  monitor: valid_accuracy
  mode: max

checkpoint:
  enabled: false
  dir: checkpoints
  save_best: true
  save_last: true
  save_every_epoch: false
  resume_from:

early_stopping:
  enabled: false
  patience: 3
  min_delta: 0.0

scheduler:
  enabled: false
  name: linear
  warmup_ratio: 0.0
  warmup_steps:

report:
  - accuracy

backup:
  enabled: false
  on_best: false
  on_finish: false
  on_failure: false
  include_logs: true
  include_checkpoints: true
