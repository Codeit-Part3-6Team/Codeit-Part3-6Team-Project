experiment:
  name: smoke_test_text
  author: team
  seed: 42
  contract_version: v1.0

paths:
  data_dir: data/text_processed
  output_dir: experiments/smoke_test_text
  backup_dir:

data:
  task: text_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  text_col: text
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json

model:
  name: keyword_text_classifier
  num_classes: auto

train:
  epochs: 1

metric:
  monitor: valid_accuracy
  mode: max

report:
  - accuracy

backup:
  enabled: false
  on_best: false
  on_finish: false
