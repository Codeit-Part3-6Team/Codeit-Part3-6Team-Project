experiment:
  name: exp001_baseline
  author: name
  seed: 42
  contract_version: v1.0

paths:
  data_dir: data/processed
  output_dir: experiments/exp001_baseline
  backup_dir:

data:
  task: image_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  image_col: image_path
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json
  image_size: 224
  use_metadata: false
  metadata_cols: []

dataloader:
  batch_size: 32
  num_workers: 2

model:
  name: mean_rgb_centroid
  pretrained: false
  num_classes: auto

train:
  epochs: 1
  loss: nearest_centroid
  optimizer:
    name: none
    lr: 0.0
    weight_decay: 0.0

transforms:
  train:
    resize: 224
    normalize: none
    augmentation: none
  eval:
    resize: 224
    normalize: none

metric:
  monitor: valid_accuracy
  mode: max

report:
  - accuracy

backup:
  enabled: false
  on_best: true
  on_finish: true
