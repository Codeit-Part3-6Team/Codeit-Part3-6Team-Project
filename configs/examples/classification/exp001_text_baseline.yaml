experiment:
  name: exp001_text_baseline
  author: name
  seed: 42
  contract_version: v1.0

paths:
  data_dir: data/examples/classification/text_processed
  output_dir: experiments/exp001_text_baseline
  backup_dir:

artifact_policy:
  run_id:
  on_existing: overwrite

data:
  task: text_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  text_col: text
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json
  max_length: 128

model:
  name: keyword_text_classifier
  hf_model_name: klue/bert-base
  num_classes: auto

train:
  epochs: 1
  loss: cross_entropy
  optimizer:
    name: adamw
    lr: 0.00002
    weight_decay: 0.01

metric:
  monitor: valid_accuracy
  mode: max

checkpoint:
  enabled: false
  dir: checkpoints
  save_best: true
  save_last: true
  save_every_epoch: false
  resume_from:

early_stopping:
  enabled: false
  patience: 3
  min_delta: 0.0

scheduler:
  enabled: false
  name: linear
  warmup_ratio: 0.0
  warmup_steps:

report:
  - accuracy

backup:
  enabled: false
  on_best: true
  on_finish: true
  on_failure: true
  include_logs: true
  include_checkpoints: true
