experiment:
  name: exp002_hf_text_finetune_colab
  author: name
  seed: 42
  contract_version: v1.0

paths:
  data_dir: /content/drive/MyDrive/codeit_ml_project/data/examples/classification/text_processed
  output_dir: /content/drive/MyDrive/codeit_ml_project/experiments/exp002_hf_text_finetune_colab
  backup_dir: /content/drive/MyDrive/codeit_ml_project/backups/exp002_hf_text_finetune_colab

artifact_policy:
  run_id:
  on_existing: overwrite

data:
  task: text_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  text_col: text
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json
  max_length: 128

model:
  name: huggingface_sequence_classifier
  model_name: distilbert-base-multilingual-cased
  num_classes: auto

train:
  epochs: 1
  batch_size: 8
  loss: cross_entropy
  optimizer:
    name: adamw
    lr: 0.00002
    weight_decay: 0.01

metric:
  monitor: valid_accuracy
  mode: max

checkpoint:
  enabled: true
  dir: checkpoints
  save_best: true
  save_last: true
  save_every_epoch: false
  resume_from:

early_stopping:
  enabled: true
  patience: 3
  min_delta: 0.0

scheduler:
  enabled: true
  name: linear
  warmup_ratio: 0.1
  warmup_steps:

report:
  - accuracy

backup:
  enabled: true
  on_best: true
  on_finish: true
  on_failure: true
  include_logs: true
  include_checkpoints: true
