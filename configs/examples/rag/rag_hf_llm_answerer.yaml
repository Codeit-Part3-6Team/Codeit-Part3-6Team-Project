experiment:
  name: rag_hf_llm_answerer_example
  author: team
  seed: 42
  contract_version: rag-v0.1

paths:
  raw_docs_dir: data/rag_sample
  output_dir: experiments/rag_hf_llm_answerer_example

artifact_policy:
  run_id:
  on_existing: overwrite

rag:
  loader:
    file_types: [txt, pdf, docx, hwpx, hwp]
  chunk:
    size: 500
    overlap: 80
    unit: char
  checkpoint:
    enabled: true
    resume: true
  embedding:
    provider: local
    model_name: hashing-char-ngram-v1
    dimension: 64
    device: auto
    normalize: true
  vector_store:
    type: memory
    path:
    collection_name: rag_hf_llm_answerer_example
  retriever:
    method: semantic
    top_k: 3
    score_threshold: 0.0
  reranker:
    enabled: false
    provider: huggingface
    model_name:
    top_k: 3
  answerer:
    mode: llm
    provider: huggingface
    model_name: google/gemma-2-2b-it
    task: text-generation
    device: cpu
    temperature: 0.0
    max_new_tokens: 256
    require_citations: true
    fallback_message: 문서에서 확인하지 못했습니다.

evaluation:
  questions_path: data/rag_sample/eval_questions.csv

metric:
  monitor: retrieval_hit_rate
  mode: max
