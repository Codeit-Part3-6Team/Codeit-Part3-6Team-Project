experiment:
  name: rag_langchain_openai
  author: team
  seed: 42
  contract_version: rag-v0.2

paths:
  raw_docs_dir: data/rag_sample
  output_dir: experiments/rag_langchain_openai

artifact_policy:
  run_id:
  on_existing: overwrite

rag:
  engine: langchain
  loader:
    file_types: [txt, pdf, docx, hwpx, hwp]
  splitter:
    type: recursive_character
    chunk_size: 800
    chunk_overlap: 120
  checkpoint:
    enabled: true
    resume: true
  embedding:
    provider: local
    model_name: hashing-char-ngram-v1
    dimension: 64
  vector_store:
    type: memory
    path:
    collection_name: rag_langchain_openai
  retriever:
    method: similarity
    top_k: 5
    score_threshold: 0.0
  reranker:
    enabled: false
    provider: huggingface
    model_name:
    top_k: 5
  answerer:
    mode: llm
    provider: openai
    model_name: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    temperature: 0.2
    max_tokens: 512
    require_citations: true
    fallback_message: 문서에서 확인하지 못했습니다.

evaluation:
  questions_path: data/rag_sample/eval_questions.csv

metric:
  monitor: retrieval_hit_rate
  mode: max
