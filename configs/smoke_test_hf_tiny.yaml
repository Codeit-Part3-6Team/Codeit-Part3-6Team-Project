experiment:
  name: smoke_test_hf_tiny
  author: team
  seed: 42
  contract_version: v1.0

paths:
  data_dir: data/text_processed
  output_dir: experiments/smoke_test_hf_tiny
  backup_dir:

artifact_policy:
  run_id:
  on_existing: overwrite

data:
  task: text_classification
  train_csv: train.csv
  valid_csv: valid.csv
  test_csv: test.csv
  text_col: text
  label_col: label
  class_map: class_map.json
  dataset_info: dataset_info.json
  max_length: 64

model:
  name: huggingface_sequence_classifier
  model_name: hf-internal-testing/tiny-random-distilbert
  num_classes: auto

train:
  epochs: 1
  batch_size: 2
  loss: cross_entropy
  optimizer:
    name: adamw
    lr: 0.00002
    weight_decay: 0.01

metric:
  monitor: valid_accuracy
  mode: max

report:
  - accuracy

backup:
  enabled: false
  on_best: true
  on_finish: true
